# Alembic configuration for ResearchOS.
#
# The DB URL is NOT set here. ``alembic/env.py`` reads it from
# ``app.config.get_settings().db_url`` so Alembic stays in lock-step with
# whatever RESEARCHOS_DB_URL points to (typically ``sqlite:///var/data/researchos.db``).
#
# Usage:
#   cd backend
#   alembic upgrade head       # apply all pending migrations
#   alembic current            # show the current revision
#   alembic history            # list all revisions
#   alembic revision --autogenerate -m "<message>"  # create a new migration
#
# The FastAPI startup hook also runs ``alembic upgrade head`` automatically
# (see app.db.migrate.run_upgrade), so existing installs self-heal to the
# latest schema without a manual alembic invocation.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Deliberately left blank: env.py resolves the URL from runtime settings.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
