version: 2
updates:
  # Backend Python deps
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps(backend)"
    # Major bumps usually have breaking changes that need manual review.
    # Dependabot only auto-proposes minor and patch updates here.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Frontend npm deps
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(actions)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
